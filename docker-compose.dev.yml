services:
  amtgardormdb:
    image: mariadb:latest
    restart: always
    environment:
      MARIADB_DATABASE: 'integtest'
      MARIADB_USER: 'integtest'
      MARIADB_PASSWORD: 'password'
      MARIADB_ROOT_PASSWORD: 'password'
    ports:
      - '24307:3306'
    expose:
      - '3306'
    volumes:
      - data-db:/var/lib/mysql
    container_name: aaro-extensions-db
    networks:
      - aaro-extensions-net

volumes:
  data-db: {}

networks:
  aaro-extensions-net: {}
